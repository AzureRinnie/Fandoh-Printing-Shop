<!DOCTYPE html>
<html>
    <head>
        <title>Products</title>
        <link rel="stylesheet" href="styleproducts.css">
    </head>
    <body>
        <h1>Products</h1>

        <div class="container">

            <div class="product">
                <h2>Colorless Bondpaper</h2>
                <img src="images/colorless.png" alt="Colorless Bondpaper">
                <div class="price">₱2.00</div>
                <button class="btn">Book Now</button>
            </div>

            <div class="product">
                <h2>Colored Bondpaper</h2>
                <img src="images/colored.png" alt="Colored Bondpaper">
                <div class="price">₱5.00</div>
                <button class="btn">Book Now</button>
            </div>

            <div class="product">
                <h2>Photo Poster</h2>
                <img src="images/photo-poster.png" alt="Photo Poster">
                <div class="price">₱40.00</div>
                <button class="btn">Buy Now</button>
            </div>

            <div class="product">
                <h2>Sticker Label</h2>
                <img src="images/sticker-label.png" alt="Sticker Label">
                <div class="price">₱4.00</div>
                <button class="btn">Buy Now</button>
            </div>

            <div class="product">
                <h2>Business Card</h2>
                <img src="images/business-card.png" alt="Business Card">
                <div class="price">₱30.00</div>
                <button class="btn">Buy Now</button>
            </div>

            <div class="product">
                <h2>Document Binding</h2>
                <img src="images/binding.png" alt="Document Binding">
                <div class="price">₱50.00</div>
                <button class="btn">Buy Now</button>
            </div>

        </div>
    </body>
</html>
